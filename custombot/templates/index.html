<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomBot Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <h1>Welcome to CustomBot Demo</h1>
    <p>This is a demo page for CustomBot. The chat widget should appear in the bottom right corner.</p>

    <div id="custombot-container"></div>

    <script src="{{ url_for('static', filename='js/widget.js') }}"></script>
    <script>
        CustomBot.init({
            serverUrl: '{{ request.url_root }}',
            botName: 'CustomBot',
            botImageUrl: '{{ url_for("static", filename="images/chat-icon.png") }}'
        });
    </script>
</body>
</html>
