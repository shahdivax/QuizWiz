<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Website</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="website-content">
        <!-- Your website content goes here -->
    </div>

    <!-- Chat Widget -->
    <div class="chat-widget">
        <div class="chat-icon">
            <img src="{{ url_for('static', filename='images/chat-icon.png') }}" alt="Chat Icon">
        </div>
        <div class="chat-ui">
            <div class="chat-header">Helper Bot</div>
            <div class="chat-messages">
                <div class="chat-bubble user">Hello!</div>
                <div class="chat-bubble bot">Hi there! How can I assist you today?</div>
            </div>
            <div class="chat-input">
                <input type="text" placeholder="Type your message...">
                <button>Send</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
